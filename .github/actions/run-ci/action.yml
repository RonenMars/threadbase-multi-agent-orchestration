name: "Run CI"
description: "Sets up Node, restores cached node_modules, and runs one CI command."

inputs:
  node-version:
    description: "Node.js version to set up"
    required: true
  command:
    description: "npm script to run (typecheck, test, build:types, etc.)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Node ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Restore node_modules cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: Run ${{ inputs.command }}
      shell: bash
      run: npm run ${{ inputs.command }}
