name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
    steps:
      - id: decide
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          haystack="${HEAD_COMMIT_MSG}
          ${PR_TITLE}
          ${PR_BODY}"
          if printf '%s' "$haystack" | grep -qF -- '[skip-ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=CI skipped::'[skip-ci]' found in commit message / PR title / PR body — run-ci step skipped, check reported green."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  setup:
    name: Setup
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/setup

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [gate, setup]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Typecheck root
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/run-ci
        with:
          node-version: 20
          command: typecheck

      - name: Typecheck agent-types package
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/run-ci
        with:
          node-version: 20
          command: typecheck:types

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [gate, setup]
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node ${{ matrix.node-version }}
        if: needs.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Restore node_modules cache
        if: needs.gate.outputs.skip != 'true'
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: needs.gate.outputs.skip != 'true' && steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Unit tests (tb-multi-agent)
        if: needs.gate.outputs.skip != 'true'
        # Exclude integration tests — they require tb-streamer's built dist/
        # at ../tb-streamer/dist/, which isn't available in this single-repo
        # CI. Integration tests run locally before merge; see
        # test/integration/README.md for the cross-repo setup.
        run: npx vitest run --exclude 'test/integration/**'

      - name: Unit tests (@threadbase/agent-types)
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/run-ci
        with:
          node-version: ${{ matrix.node-version }}
          command: test:types

  build-types:
    name: Build @threadbase/agent-types
    runs-on: ubuntu-latest
    needs: [gate, setup]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build agent-types package
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/run-ci
        with:
          node-version: 20
          command: build:types

      - name: Verify dist/ output
        if: needs.gate.outputs.skip != 'true'
        shell: bash
        run: |
          test -s packages/agent-types/dist/index.js
          test -s packages/agent-types/dist/index.d.ts
